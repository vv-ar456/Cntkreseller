<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Verification - Admin - Conitek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { padding-bottom: 0; }
        .filter-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
        .filter-row select, .filter-row input { flex:1; min-width:140px; }

        /* Status badges */
        .kyc-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; text-transform:capitalize; }
        .kyc-pending   { background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; }
        .kyc-approved  { background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; }
        .kyc-rejected  { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
        .kyc-not_submitted { background:#f5f5f5; color:#888; border:1px solid #e5e5e5; }

        /* Detail modal */
        .kyc-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .kyc-field { display:flex; flex-direction:column; gap:3px; }
        .kyc-field label { font-size:11px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:.07em; }
        .kyc-field span  { font-size:14px; font-weight:500; color:#111; }
        .kyc-section { margin-bottom:20px; }
        .kyc-section h4 { font-size:11px; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid #f0f0f0; }
        .doc-preview { margin-top:14px; }
        .doc-preview img { max-width:100%; border-radius:10px; border:1px solid #eee; cursor:zoom-in; }
        .doc-preview a { display:inline-flex; align-items:center; gap:6px; padding:10px 16px; background:#f5f0ff; color:#6c47ff; border-radius:10px; font-size:14px; font-weight:600; text-decoration:none; }
        .doc-preview a:hover { background:#ede9fe; }

        .action-row { display:flex; gap:10px; margin-top:20px; }
        .btn-approve { background:#16a34a; color:#fff; }
        .btn-approve:hover { background:#15803d; }
        .btn-reject  { background:#dc2626; color:#fff; }
        .btn-reject:hover  { background:#b91c1c; }

        .reject-note { margin-top:12px; }
        .reject-note textarea { width:100%; padding:10px 14px; border:2px solid #e5e7eb; border-radius:10px; font-size:14px; font-family:inherit; resize:vertical; outline:none; }
        .reject-note textarea:focus { border-color:#dc2626; }

        .stat-cards { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; }
        .stat-card  { background:#fff; border:1px solid #eee; border-radius:12px; padding:16px 20px; flex:1; min-width:120px; }
        .stat-card .num { font-size:24px; font-weight:800; color:#111; }
        .stat-card .lbl { font-size:12px; color:#888; margin-top:2px; }

        @media(max-width:600px) { .kyc-detail-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-logo"><h2>Conitek</h2><span>Admin Panel</span></div>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="products.html"  class="nav-item"><span class="nav-icon">📦</span> Products</a>
        <a href="categories.html"class="nav-item"><span class="nav-icon">📂</span> Categories</a>
        <a href="orders.html"    class="nav-item"><span class="nav-icon">🛍️</span> Orders</a>
        <a href="kyc.html"       class="nav-item active"><span class="nav-icon">🪪</span> KYC</a>
        <a href="settlements.html"class="nav-item"><span class="nav-icon">💰</span> Settlements</a>
        <a href="analytics.html" class="nav-item"><span class="nav-icon">📈</span> Analytics</a>
        <div style="margin-top:auto;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.1);">
            <a href="../conitek/index.html" class="nav-item" target="_blank"><span class="nav-icon">🏠</span> View Store</a>
            <button class="nav-item" onclick="adminLogout()"><span class="nav-icon">🚪</span> Logout</button>
        </div>
    </aside>

    <main class="admin-main">
        <div class="admin-header"><h1>🪪 KYC Verification</h1></div>

        <!-- Stats -->
        <div class="stat-cards" id="kycStats"></div>

        <!-- Filters -->
        <div class="filter-row">
            <select class="form-control" id="statusFilter" onchange="filterKyc()">
                <option value="">All Status</option>
                <option value="pending" selected>Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
            </select>
            <input type="text" class="form-control" id="searchFilter"
                   placeholder="🔍 Search name, phone, PAN..."
                   oninput="filterKyc()">
        </div>

        <!-- Table -->
        <div class="admin-table-container" id="kycContent">
            <div class="page-loader"><div class="loading-spinner"></div></div>
        </div>
    </main>
</div>

<!-- ══ KYC DETAIL MODAL ══ -->
<div class="modal-overlay" id="kycDetailModal">
    <div class="modal" style="max-width:680px;max-height:92vh;overflow-y:auto;">
        <button class="modal-close" onclick="closeKycModal()">✕</button>
        <h2 class="mb-2">KYC Details</h2>
        <div id="kycDetailContent">
            <div class="page-loader"><div class="loading-spinner"></div></div>
        </div>
    </div>
</div>

<div id="toastContainer" style="position:fixed;bottom:24px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script>
if (sessionStorage.getItem('adminAuth') !== 'true') location.href = 'index.html';
function adminLogout() { sessionStorage.removeItem('adminAuth'); location.href = 'index.html'; }

// ── Inline DB fallback ──────────────────────────────────────────
const _SB_URL = 'https://ahbtazekfopmjppnlrxc.supabase.co';
const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoYnRhemVrZm9wbWpwcG5scnhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTYzMzQsImV4cCI6MjA5MDU3MjMzNH0.NrgXule6SJJrwzOk11g99hkC7rQWsd7lS7veqS8QpmA';
let _sb;
try { _sb = (typeof supabase !== 'undefined' && supabase.from) ? supabase : window.supabase.createClient(_SB_URL, _SB_KEY); } catch(e) { _sb = window.supabase.createClient(_SB_URL, _SB_KEY); }

// ── Toast ────────────────────────────────────────────────────────
const Toast = {
    show(msg, type='info') {
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.textContent = msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => t.remove(), 3500);
    },
    success: m => Toast.show(m,'success'),
    error:   m => Toast.show(m,'error'),
    info:    m => Toast.show(m,'info'),
};

const fd = d => d ? new Date(d).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

let allKyc = [], currentKycId = null;

// ── LOAD ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadKyc);

async function loadKyc() {
    document.getElementById('kycContent').innerHTML = '<div class="page-loader"><div class="loading-spinner"></div></div>';
    try {
        const { data, error } = await _sb
            .from('kyc_submissions')
            .select('*, profiles(full_name, phone, email)')
            .order('submitted_at', { ascending: false });

        if (error) throw error;
        allKyc = data || [];
        renderStats(allKyc);
        filterKyc();
    } catch(e) {
        document.getElementById('kycContent').innerHTML = `<div class="empty-state"><h3>Error: ${e.message}</h3><p>Make sure kyc_submissions table exists in Supabase.</p></div>`;
    }
}

function renderStats(list) {
    const pending  = list.filter(k => k.status === 'pending').length;
    const approved = list.filter(k => k.status === 'approved').length;
    const rejected = list.filter(k => k.status === 'rejected').length;
    document.getElementById('kycStats').innerHTML = `
        <div class="stat-card"><div class="num" style="color:#c2410c;">${pending}</div><div class="lbl">⏳ Pending Review</div></div>
        <div class="stat-card"><div class="num" style="color:#15803d;">${approved}</div><div class="lbl">✅ Approved</div></div>
        <div class="stat-card"><div class="num" style="color:#dc2626;">${rejected}</div><div class="lbl">❌ Rejected</div></div>
        <div class="stat-card"><div class="num">${list.length}</div><div class="lbl">📋 Total Submissions</div></div>`;
}

function filterKyc() {
    const status = document.getElementById('statusFilter').value;
    const q      = document.getElementById('searchFilter').value.toLowerCase();

    let filtered = allKyc;
    if (status) filtered = filtered.filter(k => k.status === status);
    if (q) filtered = filtered.filter(k =>
        (k.full_name||'').toLowerCase().includes(q) ||
        (k.phone||'').includes(q) ||
        (k.pan_number||'').toLowerCase().includes(q) ||
        (k.email||'').toLowerCase().includes(q)
    );

    renderKycTable(filtered);
}

function renderKycTable(list) {
    const el = document.getElementById('kycContent');
    if (!list.length) {
        el.innerHTML = `<div class="empty-state"><h3>No KYC submissions</h3><p>Pending submissions will appear here</p></div>`;
        return;
    }
    el.innerHTML = `
        <table class="admin-table">
            <thead>
                <tr>
                    <th>User</th>
                    <th>PAN</th>
                    <th>Bank Account</th>
                    <th>Status</th>
                    <th>Submitted</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                ${list.map(k => `
                    <tr>
                        <td>
                            <strong>${k.full_name || k.profiles?.full_name || '—'}</strong>
                            <br><small class="text-muted">📱 ${k.phone || k.profiles?.phone || '—'}</small>
                            <br><small class="text-muted">✉️ ${k.email || '—'}</small>
                        </td>
                        <td><code style="font-size:13px;">${k.pan_number || '—'}</code>
                            ${k.gst_number ? `<br><small class="text-muted">GST: ${k.gst_number}</small>` : ''}
                        </td>
                        <td>
                            <div style="font-size:13px;">${k.bank_holder_name || '—'}</div>
                            <small class="text-muted">${k.bank_account_num || '—'}</small>
                            <br><small class="text-muted">IFSC: ${k.bank_ifsc || '—'}</small>
                        </td>
                        <td><span class="kyc-badge kyc-${k.status}">${k.status}</span></td>
                        <td style="font-size:13px;white-space:nowrap;">${fd(k.submitted_at)}</td>
                        <td>
                            <div style="display:flex;gap:6px;flex-wrap:wrap;">
                                <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px;"
                                    onclick="viewKyc('${k.id}')">👁 View</button>
                                ${k.status === 'pending' ? `
                                <button class="btn btn-approve" style="padding:5px 12px;font-size:12px;"
                                    onclick="approveKyc('${k.id}','${k.user_id}')">✅ Approve</button>
                                <button class="btn btn-reject" style="padding:5px 12px;font-size:12px;"
                                    onclick="openRejectModal('${k.id}','${k.user_id}')">❌ Reject</button>
                                ` : ''}
                            </div>
                        </td>
                    </tr>`).join('')}
            </tbody>
        </table>`;
}

// ── VIEW KYC DETAIL ───────────────────────────────────────────────
function viewKyc(id) {
    currentKycId = id;
    const k = allKyc.find(x => x.id === id);
    if (!k) return;

    document.getElementById('kycDetailModal').classList.add('active');
    document.getElementById('kycDetailContent').innerHTML = `
        <div style="margin-bottom:14px;">
            <span class="kyc-badge kyc-${k.status}" style="font-size:14px;">${k.status.toUpperCase()}</span>
            ${k.rejection_reason ? `<div style="margin-top:8px;padding:10px 14px;background:#fef2f2;border-radius:8px;font-size:13px;color:#dc2626;"><strong>Rejection reason:</strong> ${k.rejection_reason}</div>` : ''}
        </div>

        <div class="kyc-section">
            <h4>👤 Personal Information</h4>
            <div class="kyc-detail-grid">
                <div class="kyc-field"><label>Full Name</label><span>${k.full_name || '—'}</span></div>
                <div class="kyc-field"><label>Mobile</label><span>📱 ${k.phone || '—'}</span></div>
                <div class="kyc-field"><label>Email</label><span>${k.email || '—'}</span></div>
                <div class="kyc-field"><label>Submitted</label><span>${fd(k.submitted_at)}</span></div>
            </div>
        </div>

        <div class="kyc-section">
            <h4>🪪 Tax & Identity</h4>
            <div class="kyc-detail-grid">
                <div class="kyc-field"><label>PAN Number</label><span><code>${k.pan_number || '—'}</code></span></div>
                <div class="kyc-field"><label>GST Number</label><span>${k.gst_number || 'Not provided'}</span></div>
            </div>
        </div>

        <div class="kyc-section">
            <h4>🏦 Bank Account</h4>
            <div class="kyc-detail-grid">
                <div class="kyc-field"><label>Account Holder</label><span>${k.bank_holder_name || '—'}</span></div>
                <div class="kyc-field"><label>Account Number</label><span><code>${k.bank_account_num || '—'}</code></span></div>
                <div class="kyc-field"><label>IFSC Code</label><span><code>${k.bank_ifsc || '—'}</code></span></div>
            </div>
        </div>

        <div class="kyc-section">
            <h4>📎 Supporting Document</h4>
            ${k.doc_url
                ? k.doc_url.match(/\.(jpg|jpeg|png|webp|gif)$/i)
                    ? `<div class="doc-preview"><img src="${k.doc_url}" alt="KYC Document" onclick="window.open('${k.doc_url}')"></div>`
                    : `<div class="doc-preview"><a href="${k.doc_url}" target="_blank">📄 View Document (PDF)</a></div>`
                : '<p style="color:#aaa;font-size:13px;">No document uploaded</p>'
            }
        </div>

        ${k.status === 'pending' ? `
        <div class="action-row">
            <button class="btn btn-approve" onclick="approveKyc('${k.id}','${k.user_id}')">✅ Approve KYC</button>
            <button class="btn btn-reject"  onclick="openRejectModal('${k.id}','${k.user_id}')">❌ Reject KYC</button>
        </div>

        <div class="reject-note" id="rejectNoteWrap" style="display:none;">
            <label style="font-size:12px;font-weight:600;color:#888;display:block;margin-bottom:6px;">REJECTION REASON (shown to user)</label>
            <textarea id="rejectReason" rows="3" placeholder="e.g. PAN details don't match bank account records..."></textarea>
            <button class="btn btn-reject" style="margin-top:10px;" onclick="confirmReject('${k.id}','${k.user_id}')">Confirm Rejection</button>
        </div>
        ` : ''}
    `;
}

function closeKycModal() {
    document.getElementById('kycDetailModal').classList.remove('active');
    currentKycId = null;
}

function openRejectModal(kycId, userId) {
    // If called from modal, show inline reject note
    const wrap = document.getElementById('rejectNoteWrap');
    if (wrap) {
        wrap.style.display = wrap.style.display === 'none' ? '' : 'none';
        return;
    }
    // If called from table, open detail modal first
    viewKyc(kycId);
    setTimeout(() => {
        const w = document.getElementById('rejectNoteWrap');
        if (w) w.style.display = '';
    }, 100);
}

// ── APPROVE ──────────────────────────────────────────────────────
async function approveKyc(kycId, userId) {
    if (!confirm('Approve this KYC? User will be able to place orders.')) return;
    try {
        const now = new Date().toISOString();
        const { error: e1 } = await _sb.from('kyc_submissions').update({
            status: 'approved', reviewed_at: now
        }).eq('id', kycId);
        if (e1) throw e1;

        const { error: e2 } = await _sb.from('profiles').update({ kyc_status: 'approved' }).eq('id', userId);
        if (e2) throw e2;

        // Send notification to user
        await _sb.from('notifications').insert({
            user_id: userId,
            title: '✅ KYC Approved!',
            message: 'Your KYC has been verified. You can now place orders on Conitek.',
            type: 'kyc_approved',
            is_read: false,
        });

        Toast.success('KYC Approved ✅');
        closeKycModal();
        await loadKyc();
    } catch(e) {
        Toast.error('Failed: ' + e.message);
    }
}

// ── REJECT ───────────────────────────────────────────────────────
async function confirmReject(kycId, userId) {
    const reason = document.getElementById('rejectReason')?.value?.trim();
    if (!reason) { Toast.error('Please enter a rejection reason'); return; }

    try {
        const now = new Date().toISOString();
        const { error: e1 } = await _sb.from('kyc_submissions').update({
            status: 'rejected', reviewed_at: now, rejection_reason: reason
        }).eq('id', kycId);
        if (e1) throw e1;

        const { error: e2 } = await _sb.from('profiles').update({ kyc_status: 'rejected' }).eq('id', userId);
        if (e2) throw e2;

        // Notify user
        await _sb.from('notifications').insert({
            user_id: userId,
            title: '❌ KYC Not Approved',
            message: `Your KYC was not approved. Reason: ${reason}. Please resubmit with correct details.`,
            type: 'kyc_rejected',
            is_read: false,
        });

        Toast.success('KYC Rejected');
        closeKycModal();
        await loadKyc();
    } catch(e) {
        Toast.error('Failed: ' + e.message);
    }
}
</script>
</body>
</html>
