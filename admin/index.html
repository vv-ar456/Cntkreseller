<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Conitek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea22, #764ba222), #f0f2f5;
            padding: 20px;
        }
        .box {
            background: #fff;
            border-radius: 20px;
            padding: 44px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 40px rgba(79,70,229,0.12);
            text-align: center;
        }
        .logo { font-size: 36px; margin-bottom: 8px; }
        h2 { font-size: 24px; font-weight: 800; margin-bottom: 4px; color: #111; }
        .sub { color: #888; font-size: 14px; margin-bottom: 32px; }
        label {
            display: block; text-align: left;
            font-size: 13px; font-weight: 600;
            color: #444; margin-bottom: 6px;
        }
        .input-wrap { position: relative; margin-bottom: 20px; }
        input[type=password], input[type=text] {
            width: 100%;
            padding: 14px 48px 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            background: #fafafa;
            color: #111;
        }
        input:focus {
            border-color: #4f46e5;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79,70,229,.08);
        }
        .eye-btn {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            font-size: 18px; cursor: pointer; color: #aaa;
            padding: 4px;
        }
        .btn {
            width: 100%; padding: 15px;
            background: #4f46e5; color: #fff;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: background .2s, transform .1s;
            letter-spacing: .01em;
        }
        .btn:hover   { background: #4338ca; }
        .btn:active  { transform: scale(.98); }
        .btn:disabled { background: #a5b4fc; cursor: not-allowed; transform: none; }
        .msg {
            margin-top: 14px; padding: 12px 16px;
            border-radius: 10px; font-size: 14px;
            font-weight: 500; display: none;
            line-height: 1.4;
        }
        .msg.err { background: #fef2f2; color: #dc2626; display: block; }
        .msg.ok  { background: #f0fdf4; color: #16a34a; display: block; }
        .back { margin-top: 20px; font-size: 13px; color: #aaa; }
        .back a { color: #4f46e5; text-decoration: none; }
        .back a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">🔒</div>
    <h2>Conitek Admin</h2>
    <p class="sub">Enter password to access dashboard</p>

    <label for="pw">Admin Password</label>
    <div class="input-wrap">
        <input type="password" id="pw"
               placeholder="Enter admin password"
               onkeydown="if(event.key==='Enter') login()"
               autofocus>
        <button class="eye-btn" onclick="toggleEye()" id="eyeBtn" type="button">👁</button>
    </div>

    <button class="btn" id="loginBtn" onclick="login()">Login to Admin</button>
    <div class="msg" id="msg"></div>

    <p class="back"><a href="../index.html">← Back to Store</a></p>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ── Already logged in? ────────────────────────────────────────────────────
if (sessionStorage.getItem('adminAuth') === 'true') {
    location.href = 'dashboard.html';
}

// ── Supabase credentials (copied from supabase-client.js) ─────────────────
const _SUPA_URL = 'https://ahbtazekfopmjppnlrxc.supabase.co';
const _SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoYnRhemVrZm9wbWpwcG5scnhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTYzMzQsImV4cCI6MjA5MDU3MjMzNH0.NrgXule6SJJrwzOk11g99hkC7rQWsd7lS7veqS8QpmA';

// Supabase client (this page creates its own — no dependency on supabase-client.js)
let _sb;
try {
    _sb = window.supabase.createClient(_SUPA_URL, _SUPA_KEY);
} catch(e) {
    console.error('Supabase init failed:', e);
}

// ─────────────────────────────────────────────────────────────────────────────
function show(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = 'msg ' + type;
}

function toggleEye() {
    const pw  = document.getElementById('pw');
    const btn = document.getElementById('eyeBtn');
    pw.type         = pw.type === 'password' ? 'text' : 'password';
    btn.textContent = pw.type === 'password' ? '👁' : '🙈';
}

function success() {
    sessionStorage.setItem('adminAuth', 'true');
    show('✅ Login successful! Redirecting...', 'ok');
    document.getElementById('loginBtn').textContent = '✓ Done';
    setTimeout(() => location.href = 'dashboard.html', 500);
}

async function login() {
    const pw  = document.getElementById('pw').value.trim();
    const btn = document.getElementById('loginBtn');

    // Reset message
    document.getElementById('msg').className = 'msg';

    if (!pw) {
        show('Please enter the admin password', 'err');
        document.getElementById('pw').focus();
        return;
    }

    btn.disabled    = true;
    btn.textContent = '⏳ Verifying...';

    try {
        if (!_sb) throw new Error('Supabase client failed to initialize');

        // Query admin_config with timeout
        const { data, error } = await Promise.race([
            _sb.from('admin_config')
               .select('value')
               .eq('key', 'admin_password')
               .single(),
            new Promise((_, reject) =>
                setTimeout(() => reject(new Error('timeout')), 8000)
            )
        ]);

        if (error) {
            // RLS is blocking — tell user exact fix
            console.error('Supabase error:', error);
            show('⚠️ Database blocked. Add RLS policy (see console for help).', 'err');
            console.warn(
                '═══ FIX: Supabase RLS is blocking admin_config read ═══\n' +
                'Go to: Supabase Dashboard → SQL Editor → Run this:\n\n' +
                "CREATE POLICY \"anon_read_admin_password\" ON public.admin_config\n" +
                "FOR SELECT TO anon USING (key = 'admin_password');\n" +
                '══════════════════════════════════════════════════════'
            );
            return;
        }

        if (!data) {
            show('⚠️ admin_password row missing in admin_config table.', 'err');
            return;
        }

        if (data.value === pw) {
            success();
        } else {
            show('❌ Incorrect password. Please try again.', 'err');
            document.getElementById('pw').value = '';
            document.getElementById('pw').focus();
        }

    } catch(e) {
        if (e.message === 'timeout') {
            show('⏱️ Request timed out — Supabase RLS is likely blocking. Check console.', 'err');
            console.warn(
                '═══ FIX: Run this SQL in Supabase Dashboard → SQL Editor ═══\n' +
                "CREATE POLICY \"anon_read_admin_password\" ON public.admin_config\n" +
                "FOR SELECT TO anon USING (key = 'admin_password');\n" +
                '══════════════════════════════════════════════════════════'
            );
        } else {
            show('Error: ' + e.message, 'err');
        }
    } finally {
        if (document.getElementById('loginBtn').textContent !== '✓ Done') {
            btn.disabled    = false;
            btn.textContent = 'Login to Admin';
        }
    }
}
</script>
</body>
</html>
