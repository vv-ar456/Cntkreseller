<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Conitek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-box">
            <div class="logo">🔒 Conitek</div>
            <h2>Admin Panel</h2>
            <p>Enter password to access admin dashboard</p>
            
            <div class="form-group" style="text-align:left;">
                <label>Admin Password</label>
                <input type="password" class="form-control" id="adminPassword" placeholder="Enter password" 
                       onkeydown="if(event.key==='Enter')adminLogin()">
            </div>
            <button class="btn btn-primary btn-full btn-lg" onclick="adminLogin()" id="adminLoginBtn">
                Login to Admin
            </button>
            <p class="mt-2" style="font-size:12px;"><a href="/" style="color:var(--primary);">← Back to Store</a></p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
        // Check if already logged in
        if (sessionStorage.getItem('adminAuth') === 'true') {
            window.location.href = 'dashboard.html';
        }
        
        async function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            const btn = document.getElementById('adminLoginBtn');
            
            if (!password) {
                Toast.error('Please enter password');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner sm"></span> Verifying...';
            
            const { data, error } = await DB.getAdminConfig('admin_password');
            
            if (data && data.value === password) {
                sessionStorage.setItem('adminAuth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                Toast.error('Invalid password');
                btn.disabled = false;
                btn.textContent = 'Login to Admin';
            }
        }
    </script>
</body>
</html>
<!-- Add to all admin pages before closing </body> -->
