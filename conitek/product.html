<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - Conitek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="/" class="header-logo">
                <img src="logo.png" alt="Conitek" onerror="this.style.display='none'">
                <span>Conitek</span>
            </a>
            <div class="header-search">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search products..." onkeydown="handleSearch(event)">
            </div>
            <div class="header-actions">
                <a href="cart.html" class="header-action-btn">🛒<span class="badge cart-badge hidden">0</span></a>
                <button class="btn btn-primary btn-sm" id="loginBtn" onclick="Auth.showLoginModal()">Login</button>
                <div style="position:relative;">
                    <button class="user-menu-trigger hidden" id="userMenuTrigger">
                        <span class="avatar" id="userAvatar">U</span>
                        <span class="user-name" id="userName">User</span>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="account.html">👤 My Account</a>
                        <a href="orders.html">📦 My Orders</a>
                        <a href="payment.html">💰 Payments</a>
                        <a href="analytics.html">📊 Analytics</a>
                        <div class="divider"></div>
                        <button class="logout-btn" onclick="Auth.signOut()">🚪 Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <main class="main-content" id="productPage">
        <div class="page-loader"><div class="loading-spinner"></div></div>
    </main>
    
    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="/" class="bottom-nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="category.html" class="bottom-nav-item"><span class="nav-icon">📂</span>Categories</a>
        <a href="cart.html" class="bottom-nav-item"><span class="nav-icon">🛒</span>Cart</a>
        <a href="orders.html" class="bottom-nav-item"><span class="nav-icon">📦</span>Orders</a>
        <a href="account.html" class="bottom-nav-item"><span class="nav-icon">👤</span>Account</a>
    </nav>
    
    <!-- Auth Modal (same as index) -->
    <div class="modal-overlay" id="authModal">
        <div class="modal auth-modal">
            <button class="modal-close" onclick="Auth.hideLoginModal()">✕</button>
            <div class="auth-header">
                <div class="logo">Conitek</div>
                <h2>Welcome</h2>
                <p>Login to continue</p>
            </div>
            <div id="phoneStep">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" class="form-control" id="authPhone" placeholder="10-digit number" maxlength="10">
                </div>
                <button class="btn btn-primary btn-full btn-lg" id="sendOtpBtn" onclick="Auth.sendLoginOTP()">Send OTP</button>
            </div>
            <div id="otpStep" class="hidden">
                <p class="text-center text-muted mb-2">Enter 6-digit OTP</p>
                <div class="otp-inputs">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                    <input type="text" maxlength="1" inputmode="numeric">
                </div>
                <button class="btn btn-primary btn-full btn-lg mt-2" id="verifyOtpBtn" onclick="Auth.verifyLoginOTP()">Verify OTP</button>
                <div class="resend-otp"><span id="resendTimer"></span><button id="resendOtpBtn" onclick="Auth.resendOTP()" disabled>Resend OTP</button></div>
            </div>
            <div id="nameStep" class="hidden">
                <div class="form-group"><label>Full Name</label><input type="text" class="form-control" id="authName" placeholder="Your name"></div>
                <button class="btn btn-primary btn-full btn-lg" onclick="Auth.completeRegistration()">Complete</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/product.js"></script>
</body>
</html>
