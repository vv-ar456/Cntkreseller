<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Admin - Conitek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>body{padding-bottom:0;}</style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-logo"><h2>Conitek</h2><span>Admin Panel</span></div>
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="products.html" class="nav-item"><span class="nav-icon">📦</span> Products</a>
            <a href="categories.html" class="nav-item"><span class="nav-icon">📂</span> Categories</a>
            <a href="orders.html" class="nav-item active"><span class="nav-icon">🛍️</span> Orders</a>
            <a href="settlements.html" class="nav-item"><span class="nav-icon">💰</span> Settlements</a>
            <a href="analytics.html" class="nav-item"><span class="nav-icon">📈</span> Analytics</a>
            <div style="margin-top:auto;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.1);">
                <a href="/" class="nav-item"><span class="nav-icon">🏠</span> Store</a>
                <button class="nav-item" onclick="sessionStorage.removeItem('adminAuth');location='index.html'"><span class="nav-icon">🚪</span> Logout</button>
            </div>
        </aside>
        
        <main class="admin-main">
            <div class="admin-header"><h1>Orders Management</h1></div>
            
            <!-- Filters -->
            <div class="admin-filters">
                <select class="filter-select" id="statusFilter" onchange="filterOrders()">
                    <option value="">All Statuses</option>
                    <option value="placed">Placed</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="out_for_delivery">Out for Delivery</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="rto_initiated">RTO Initiated</option>
                    <option value="rto_completed">RTO Completed</option>
                </select>
                <input type="text" class="filter-input" id="searchFilter" placeholder="Search order number..." oninput="filterOrders()">
            </div>
            
            <!-- Order Update Modal -->
            <div class="modal-overlay" id="orderModal">
                <div class="modal" style="max-width:550px;">
                    <button class="modal-close" onclick="document.getElementById('orderModal').classList.remove('active')">✕</button>
                    <h2 class="mb-2">Update Order <span id="updateOrderNum"></span></h2>
                    <input type="hidden" id="updateOrderId">
                    
                    <div class="form-group">
                        <label>Order Status</label>
                        <select class="form-control" id="updateStatus">
                            <option value="placed">Placed</option>
                            <option value="confirmed">Confirmed</option>
                            <option value="processing">Processing</option>
                            <option value="shipped">Shipped</option>
                            <option value="out_for_delivery">Out for Delivery</option>
                            <option value="delivered">Delivered</option>
                            <option value="cancelled">Cancelled</option>
                            <option value="rto_initiated">RTO Initiated</option>
                            <option value="rto_completed">RTO Completed</option>
                            <option value="returned">Returned</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tracking Number</label>
                        <input type="text" class="form-control" id="updateTracking" placeholder="Tracking number">
                    </div>
                    <div class="form-group">
                        <label>Tracking URL</label>
                        <input type="url" class="form-control" id="updateTrackingUrl" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea class="form-control" id="updateNotes" rows="3"></textarea>
                    </div>
                    
                    <div class="flex gap-1">
                        <button class="btn btn-primary" onclick="updateOrderStatus()">Update Order</button>
                        <button class="btn btn-ghost" onclick="document.getElementById('orderModal').classList.remove('active')">Cancel</button>
                    </div>
                </div>
            </div>
            
            <div id="ordersContent"><div class="page-loader"><div class="loading-spinner"></div></div></div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
        if (sessionStorage.getItem('adminAuth') !== 'true') location = 'index.html';
        
        let allOrders = [];
        
        document.addEventListener('DOMContentLoaded', loadAdminOrders);
        
        async function loadAdminOrders() {
            const container = document.getElementById('ordersContent');
            const { data } = await DB.getAllOrders();
            allOrders = data || [];
            renderOrders(allOrders);
        }
        
        function filterOrders() {
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            
            let filtered = allOrders;
            if (status) filtered = filtered.filter(o => o.order_status === status);
            if (search) filtered = filtered.filter(o => 
                o.order_number.toLowerCase().includes(search) || 
                o.customer_name?.toLowerCase().includes(search) ||
                o.customer_phone?.includes(search)
            );
            
            renderOrders(filtered);
        }
        
        function renderOrders(orders) {
            const container = document.getElementById('ordersContent');
            
            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No orders found</h3></div>';
                return;
            }
            
            container.innerHTML = `
                <div class="admin-table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Order</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Margin</th>
                                <th>Status</th>
                                <th>Payment</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${orders.map(o => `
                                <tr>
                                    <td><strong>${o.order_number}</strong></td>
                                    <td>
                                        ${o.customer_name || o.profiles?.full_name || '-'}
                                        <br><small class="text-muted">${o.customer_phone || o.profiles?.phone || ''}</small>
                                    </td>
                                    <td><strong>${formatCurrency(o.total_amount)}</strong></td>
                                    <td><span class="text-success">${formatCurrency(o.total_margin)}</span></td>
                                    <td><span class="order-status-badge ${o.order_status}">${o.order_status.replace(/_/g,' ')}</span></td>
                                    <td><span class="tag ${o.payment_status === 'paid' ? 'tag-success' : 'tag-warning'}">${o.payment_status}</span></td>
                                    <td>${formatDate(o.created_at)}</td>
                                    <td>
                                        <div class="actions">
                                            <button class="edit-btn" onclick="showUpdateOrder('${o.id}', '${o.order_number}', '${o.order_status}', '${o.tracking_number || ''}', '${o.tracking_url || ''}', '${(o.notes || '').replace(/'/g, "\\'")}')">Update</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function showUpdateOrder(id, num, status, tracking, trackingUrl, notes) {
            document.getElementById('updateOrderId').value = id;
            document.getElementById('updateOrderNum').textContent = '#' + num;
            document.getElementById('updateStatus').value = status;
            document.getElementById('updateTracking').value = tracking;
            document.getElementById('updateTrackingUrl').value = trackingUrl;
            document.getElementById('updateNotes').value = notes;
            document.getElementById('orderModal').classList.add('active');
        }
        
        async function updateOrderStatus() {
            const id = document.getElementById('updateOrderId').value;
            const status = document.getElementById('updateStatus').value;
            
            const updates = {
                order_status: status,
                tracking_number: document.getElementById('updateTracking').value.trim() || null,
                tracking_url: document.getElementById('updateTrackingUrl').value.trim() || null,
                notes: document.getElementById('updateNotes').value.trim() || null
            };
            
            if (status === 'shipped') updates.shipped_at = new Date().toISOString();
            if (status === 'delivered') updates.delivered_at = new Date().toISOString();
            if (status === 'cancelled') updates.cancelled_at = new Date().toISOString();
            if (status === 'rto_initiated') updates.rto_initiated_at = new Date().toISOString();
            if (status === 'rto_completed') updates.rto_completed_at = new Date().toISOString();
            
            const { error } = await DB.updateOrder(id, updates);
            if (error) {
                Toast.error('Failed: ' + error.message);
                return;
            }
            
            Toast.success('Order updated!');
            document.getElementById('orderModal').classList.remove('active');
            loadAdminOrders();
        }
    </script>
</body>
</html>
