<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Admin - Conitek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { padding-bottom: 0; }
        .product-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .product-form-grid .full-width { grid-column: 1 / -1; }
        .image-preview-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .image-preview-grid img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border); }
        .preview-placeholder { color: var(--text2); font-size: 13px; }
        .product-cell { display: flex; align-items: center; gap: 12px; }
        .product-cell .thumb { width: 48px; height: 48px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: var(--surface2); }
        .product-cell .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .filter-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-row input, .filter-row select { flex: 1; min-width: 160px; }
        @media(max-width:640px) { .product-form-grid { grid-template-columns: 1fr; } .product-form-grid .full-width { grid-column: 1; } }
    </style>
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-logo"><h2>Conitek</h2><span>Admin Panel</span></div>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="products.html" class="nav-item active"><span class="nav-icon">📦</span> Products</a>
        <a href="categories.html" class="nav-item"><span class="nav-icon">📂</span> Categories</a>
        <a href="orders.html" class="nav-item"><span class="nav-icon">🛍️</span> Orders</a>
        <a href="settlements.html" class="nav-item"><span class="nav-icon">💰</span> Settlements</a>
        <a href="analytics.html" class="nav-item"><span class="nav-icon">📈</span> Analytics</a>
        <div style="margin-top:auto;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.1);">
            <a href="../conitek/index.html" class="nav-item"><span class="nav-icon">🏠</span> View Store</a>
            <button class="nav-item" onclick="adminLogout()"><span class="nav-icon">🚪</span> Logout</button>
        </div>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1>Products</h1>
            <button class="btn btn-primary" onclick="showProductForm()">+ Add Product</button>
        </div>

        <!-- Search & Filter -->
        <div class="filter-row">
            <input type="text" class="form-control" id="searchInput" placeholder="🔍 Search products..." oninput="filterProducts()">
            <select class="form-control" id="categoryFilter" onchange="filterProducts()">
                <option value="">All Categories</option>
            </select>
            <select class="form-control" id="statusFilter" onchange="filterProducts()">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>

        <!-- Product Form Modal -->
        <div class="modal-overlay" id="productModal">
            <div class="modal" style="max-width:720px; max-height:92vh; overflow-y:auto;">
                <button class="modal-close" onclick="hideProductForm()">✕</button>
                <h2 class="mb-2" id="productFormTitle">Add New Product</h2>
                <form onsubmit="saveProduct(event)" id="productForm">
                    <input type="hidden" id="productId">
                    <div class="product-form-grid">
                        <div class="form-group">
                            <label>Product Name *</label>
                            <input type="text" class="form-control" id="pName" required placeholder="Enter product name">
                        </div>
                        <div class="form-group">
                            <label>SKU</label>
                            <input type="text" class="form-control" id="pSku" placeholder="e.g. CNT-001">
                        </div>
                        <div class="form-group">
                            <label>MRP (₹) *</label>
                            <input type="number" class="form-control" id="pMrp" required step="0.01" min="0" placeholder="0.00" oninput="calcMargin()">
                        </div>
                        <div class="form-group">
                            <label>Base Price (₹) *</label>
                            <input type="number" class="form-control" id="pBasePrice" required step="0.01" min="0" placeholder="0.00" oninput="calcMargin()">
                            <span class="form-hint" id="marginHint">Reseller margin = MRP − Base Price</span>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select class="form-control" id="pCategory" onchange="loadSubCategories()">
                                <option value="">Select category</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Sub Category</label>
                            <select class="form-control" id="pSubCategory">
                                <option value="">Select sub-category</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Stock *</label>
                            <input type="number" class="form-control" id="pStock" required min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label>Weight (grams)</label>
                            <input type="number" class="form-control" id="pWeight" min="0" value="0">
                        </div>
                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea class="form-control" id="pDescription" rows="4" placeholder="Describe the product..."></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label>Thumbnail URL</label>
                            <input type="url" class="form-control" id="pThumbnail" placeholder="https://..." oninput="previewImages()">
                        </div>
                        <div class="form-group full-width">
                            <label>Additional Image URLs <small class="text-muted">(one per line)</small></label>
                            <textarea class="form-control" id="pImages" rows="3" placeholder="https://image1.jpg&#10;https://image2.jpg" oninput="previewImages()"></textarea>
                        </div>
                        <!-- Image Preview -->
                        <div class="form-group full-width">
                            <label>Image Preview</label>
                            <div id="imagePreview">
                                <p class="preview-placeholder text-muted" style="font-size:13px;">No images added</p>
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label>Tags <small class="text-muted">(comma separated)</small></label>
                            <input type="text" class="form-control" id="pTags" placeholder="electronics, sale, new">
                        </div>
                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="pFeatured">
                                <label for="pFeatured" style="margin:0;">⭐ Featured Product</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="pSpecial">
                                <label for="pSpecial" style="margin:0;">🔥 Special Deal</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="pActive" checked>
                                <label for="pActive" style="margin:0;">✅ Active (visible in store)</label>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-1 mt-2">
                        <button type="submit" class="btn btn-primary" id="saveProductBtn">Save Product</button>
                        <button type="button" class="btn btn-ghost" onclick="hideProductForm()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Products List -->
        <div id="productsContent">
            <div class="page-loader"><div class="loading-spinner"></div></div>
        </div>
    </main>
</div>

<!-- Toast Container -->
<div id="toastContainer" style="position:fixed;bottom:32px;right:32px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script>
// ─── AUTH GUARD ──────────────────────────────────────────────────────────────
if (sessionStorage.getItem('adminAuth') !== 'true') location.href = 'index.html';

function adminLogout() {
    sessionStorage.removeItem('adminAuth');
    location.href = 'index.html';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
const Toast = {
    show(msg, type = 'info') {
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.textContent = msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => t.remove(), 3500);
    },
    success: (m) => Toast.show(m, 'success'),
    error:   (m) => Toast.show(m, 'error'),
    info:    (m) => Toast.show(m, 'info'),
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function formatCurrency(n) { return '₹' + Number(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 }); }
function slugify(t) { return t.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

// ─── STATE ───────────────────────────────────────────────────────────────────
let allProducts = [];
let allCategories = [];

// ─── INIT ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    await loadCategories();
    await loadProducts();
});

// ─── LOAD CATEGORIES ─────────────────────────────────────────────────────────
async function loadCategories() {
    try {
        const { data } = await DB.getAllCategories();
        allCategories = data || [];

        const catSelect = document.getElementById('pCategory');
        const catFilter = document.getElementById('categoryFilter');
        const parents = allCategories.filter(c => !c.parent_id);
        parents.forEach(c => {
            catSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            catFilter.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    } catch(e) { console.error('Category load error', e); }
}

function loadSubCategories() {
    const catId = document.getElementById('pCategory').value;
    const subSelect = document.getElementById('pSubCategory');
    subSelect.innerHTML = '<option value="">Select sub-category</option>';
    allCategories.filter(c => c.parent_id === catId).forEach(c => {
        subSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    });
}

// ─── LOAD PRODUCTS ───────────────────────────────────────────────────────────
async function loadProducts() {
    const container = document.getElementById('productsContent');
    container.innerHTML = '<div class="page-loader"><div class="loading-spinner"></div></div>';
    try {
        const { data } = await DB.getAllProducts();
        allProducts = data || [];
        renderProducts(allProducts);
    } catch(e) {
        container.innerHTML = '<div class="empty-state"><h3>Failed to load products</h3></div>';
    }
}

// ─── FILTER ──────────────────────────────────────────────────────────────────
function filterProducts() {
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const cat    = document.getElementById('categoryFilter').value;
    const status = document.getElementById('statusFilter').value;

    let filtered = allProducts;
    if (q)      filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q));
    if (cat)    filtered = filtered.filter(p => p.category_id === cat);
    if (status === 'active')   filtered = filtered.filter(p => p.is_active);
    if (status === 'inactive') filtered = filtered.filter(p => !p.is_active);

    renderProducts(filtered);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderProducts(products) {
    const container = document.getElementById('productsContent');

    if (!products || products.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div style="font-size:48px;margin-bottom:16px;">📦</div>
                <h3>No products found</h3>
                <p>Try changing filters or add a new product</p>
                <button class="btn btn-primary mt-2" onclick="showProductForm()">+ Add Product</button>
            </div>`;
        return;
    }

    container.innerHTML = `
        <div class="admin-table-container">
            <div style="padding:12px 16px;color:var(--text2);font-size:14px;">
                Showing <strong>${products.length}</strong> product${products.length !== 1 ? 's' : ''}
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>MRP</th>
                        <th>Base Price</th>
                        <th>Max Margin</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    ${products.map(p => `
                        <tr>
                            <td>
                                <div class="product-cell">
                                    <div class="thumb">
                                        <img src="${p.thumbnail || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22><rect width=%2248%22 height=%2248%22 fill=%22%23eee%22/><text x=%2250%25%22 y=%2255%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2220%22>📦</text></svg>'}" 
                                             alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22><rect width=%2248%22 height=%2248%22 fill=%22%23eee%22/></svg>'">
                                    </div>
                                    <div>
                                        <strong>${p.name}</strong>
                                        <br><small class="text-muted">${p.sku || 'No SKU'} ${p.is_featured ? '⭐' : ''} ${p.is_special ? '🔥' : ''}</small>
                                        <br><small class="text-muted">Stock: ${p.stock}</small>
                                    </div>
                                </div>
                            </td>
                            <td><strong>${formatCurrency(p.mrp)}</strong></td>
                            <td>${formatCurrency(p.base_price)}</td>
                            <td><span class="text-success">+${formatCurrency(p.mrp - p.base_price)}</span></td>
                            <td>
                                <span class="${p.stock === 0 ? 'text-danger' : p.stock < 5 ? 'text-warning' : ''}">
                                    ${p.stock === 0 ? '❌ Out' : p.stock < 5 ? '⚠️ Low: ' + p.stock : p.stock}
                                </span>
                            </td>
                            <td><span class="tag ${p.is_active ? 'tag-success' : 'tag-danger'}">${p.is_active ? 'Active' : 'Inactive'}</span></td>
                            <td>
                                <div class="actions">
                                    <button class="edit-btn" onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&#39;")})'>Edit</button>
                                    <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px;" onclick='duplicateProduct(${JSON.stringify(p).replace(/'/g, "&#39;")})'>Duplicate</button>
                                    <button class="delete-btn" onclick="deleteProduct('${p.id}', '${p.name.replace(/'/g,"\\'")}')">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
}

// ─── IMAGE PREVIEW ───────────────────────────────────────────────────────────
function previewImages() {
    const thumb  = document.getElementById('pThumbnail').value.trim();
    const extras = document.getElementById('pImages').value.split('\n').map(s => s.trim()).filter(Boolean);
    const allImgs = [thumb, ...extras].filter(Boolean);
    const preview = document.getElementById('imagePreview');

    if (allImgs.length === 0) {
        preview.innerHTML = '<p class="preview-placeholder text-muted" style="font-size:13px;">No images added</p>';
        return;
    }
    preview.innerHTML = `
        <div class="image-preview-grid">
            ${allImgs.map((url, i) => `
                <div style="position:relative;">
                    <img src="${url}" alt="Preview ${i+1}" onerror="this.style.opacity=0.3">
                    ${i===0 ? '<span style="position:absolute;top:2px;left:2px;background:#000a;color:#fff;font-size:9px;padding:1px 4px;border-radius:4px;">THUMB</span>' : ''}
                </div>`).join('')}
        </div>`;
}

// ─── MARGIN CALCULATOR ───────────────────────────────────────────────────────
function calcMargin() {
    const mrp  = parseFloat(document.getElementById('pMrp').value) || 0;
    const base = parseFloat(document.getElementById('pBasePrice').value) || 0;
    const hint = document.getElementById('marginHint');
    if (mrp && base) {
        const margin = mrp - base;
        const pct = mrp > 0 ? ((margin / mrp) * 100).toFixed(1) : 0;
        hint.innerHTML = margin >= 0
            ? `Max reseller margin: <strong class="text-success">${formatCurrency(margin)} (${pct}%)</strong>`
            : `<span class="text-danger">⚠️ Base price exceeds MRP!</span>`;
    } else {
        hint.textContent = 'Reseller margin = MRP − Base Price';
    }
}

// ─── SHOW / HIDE FORM ────────────────────────────────────────────────────────
function showProductForm() {
    document.getElementById('productFormTitle').textContent = 'Add New Product';
    document.getElementById('productForm').reset();
    document.getElementById('productId').value = '';
    document.getElementById('pActive').checked = true;
    document.getElementById('imagePreview').innerHTML = '<p class="preview-placeholder text-muted" style="font-size:13px;">No images added</p>';
    document.getElementById('marginHint').textContent = 'Reseller margin = MRP − Base Price';
    document.getElementById('productModal').classList.add('active');
}

function hideProductForm() {
    document.getElementById('productModal').classList.remove('active');
}

// ─── EDIT PRODUCT ────────────────────────────────────────────────────────────
function editProduct(product) {
    document.getElementById('productFormTitle').textContent = 'Edit Product';
    document.getElementById('productId').value        = product.id;
    document.getElementById('pName').value            = product.name;
    document.getElementById('pSku').value             = product.sku || '';
    document.getElementById('pMrp').value             = product.mrp;
    document.getElementById('pBasePrice').value       = product.base_price;
    document.getElementById('pCategory').value        = product.category_id || '';
    document.getElementById('pStock').value           = product.stock;
    document.getElementById('pWeight').value          = product.weight_grams || 0;
    document.getElementById('pDescription').value     = product.description || '';
    document.getElementById('pThumbnail').value       = product.thumbnail || '';
    document.getElementById('pImages').value          = (product.images || []).join('\n');
    document.getElementById('pTags').value            = (product.tags || []).join(', ');
    document.getElementById('pFeatured').checked      = product.is_featured;
    document.getElementById('pSpecial').checked       = product.is_special;
    document.getElementById('pActive').checked        = product.is_active;

    loadSubCategories();
    setTimeout(() => {
        document.getElementById('pSubCategory').value = product.subcategory_id || '';
    }, 100);

    calcMargin();
    previewImages();
    document.getElementById('productModal').classList.add('active');
}

// ─── DUPLICATE PRODUCT ───────────────────────────────────────────────────────
function duplicateProduct(product) {
    const copy = { ...product };
    delete copy.id;
    copy.name = copy.name + ' (Copy)';
    copy.sku  = copy.sku ? copy.sku + '-COPY' : '';
    copy.is_active = false;
    editProduct(copy);
    document.getElementById('productFormTitle').textContent = 'Duplicate Product';
    document.getElementById('productId').value = ''; // treat as new
}

// ─── SAVE PRODUCT ────────────────────────────────────────────────────────────
async function saveProduct(e) {
    e.preventDefault();

    const id   = document.getElementById('productId').value;
    const name = document.getElementById('pName').value.trim();
    const mrp  = parseFloat(document.getElementById('pMrp').value);
    const base = parseFloat(document.getElementById('pBasePrice').value);

    if (base > mrp) {
        Toast.error('Base price cannot be greater than MRP');
        return;
    }

    const productData = {
        name,
        sku:           document.getElementById('pSku').value.trim() || null,
        mrp,
        base_price:    base,
        category_id:   document.getElementById('pCategory').value || null,
        subcategory_id:document.getElementById('pSubCategory').value || null,
        stock:         parseInt(document.getElementById('pStock').value) || 0,
        weight_grams:  parseInt(document.getElementById('pWeight').value) || 0,
        description:   document.getElementById('pDescription').value.trim(),
        thumbnail:     document.getElementById('pThumbnail').value.trim() || null,
        images:        document.getElementById('pImages').value.split('\n').map(s => s.trim()).filter(Boolean),
        tags:          document.getElementById('pTags').value.split(',').map(s => s.trim()).filter(Boolean),
        is_featured:   document.getElementById('pFeatured').checked,
        is_special:    document.getElementById('pSpecial').checked,
        is_active:     document.getElementById('pActive').checked
    };

    if (!id) {
        productData.slug = slugify(name) + '-' + Date.now().toString(36);
    }

    const btn = document.getElementById('saveProductBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
        const result = id
            ? await DB.updateProduct(id, productData)
            : await DB.createProduct(productData);

        if (result.error) throw result.error;

        Toast.success(id ? 'Product updated!' : 'Product created!');
        hideProductForm();
        await loadProducts();
    } catch(err) {
        Toast.error('Failed: ' + (err.message || 'Unknown error'));
    } finally {
        btn.disabled = false;
        btn.textContent = 'Save Product';
    }
}

// ─── DELETE PRODUCT ──────────────────────────────────────────────────────────
async function deleteProduct(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try {
        const { error } = await DB.deleteProduct(id);
        if (error) throw error;
        Toast.success('Product deleted');
        await loadProducts();
    } catch(e) {
        Toast.error('Failed to delete: ' + e.message);
    }
}
</script>
</body>
</html>
