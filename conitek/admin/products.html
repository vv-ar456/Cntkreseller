<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Admin - Conitek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>body{padding-bottom:0;}</style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-logo"><h2>Conitek</h2><span>Admin Panel</span></div>
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="products.html" class="nav-item active"><span class="nav-icon">📦</span> Products</a>
            <a href="categories.html" class="nav-item"><span class="nav-icon">📂</span> Categories</a>
            <a href="orders.html" class="nav-item"><span class="nav-icon">🛍️</span> Orders</a>
            <a href="settlements.html" class="nav-item"><span class="nav-icon">💰</span> Settlements</a>
            <a href="analytics.html" class="nav-item"><span class="nav-icon">📈</span> Analytics</a>
            <div style="margin-top:auto;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.1);">
                <a href="/" class="nav-item"><span class="nav-icon">🏠</span> View Store</a>
                <button class="nav-item" onclick="sessionStorage.removeItem('adminAuth');location='index.html'"><span class="nav-icon">🚪</span> Logout</button>
            </div>
        </aside>
        
        <main class="admin-main">
            <div class="admin-header">
                <h1>Products</h1>
                <button class="btn btn-primary" onclick="showProductForm()">+ Add Product</button>
            </div>
            
            <!-- Product Form Modal -->
            <div class="modal-overlay" id="productModal">
                <div class="modal" style="max-width:700px;">
                    <button class="modal-close" onclick="hideProductForm()">✕</button>
                    <h2 class="mb-2" id="productFormTitle">Add New Product</h2>
                    <form onsubmit="saveProduct(event)" id="productForm">
                        <input type="hidden" id="productId">
                        <div class="product-form-grid">
                            <div class="form-group">
                                <label>Product Name *</label>
                                <input type="text" class="form-control" id="pName" required placeholder="Product name">
                            </div>
                            <div class="form-group">
                                <label>SKU</label>
                                <input type="text" class="form-control" id="pSku" placeholder="SKU code">
                            </div>
                            <div class="form-group">
                                <label>MRP (₹) *</label>
                                <input type="number" class="form-control" id="pMrp" required step="0.01" min="0" placeholder="0.00">
                            </div>
                            <div class="form-group">
                                <label>Base Price (₹) *</label>
                                <input type="number" class="form-control" id="pBasePrice" required step="0.01" min="0" placeholder="0.00">
                                <span class="form-hint">Difference = max margin for resellers</span>
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <select class="form-control" id="pCategory"><option value="">Select category</option></select>
                            </div>
                            <div class="form-group">
                                <label>Sub Category</label>
                                <select class="form-control" id="pSubCategory"><option value="">Select sub-category</option></select>
                            </div>
                            <div class="form-group">
                                <label>Stock *</label>
                                <input type="number" class="form-control" id="pStock" required min="0" value="0">
                            </div>
                            <div class="form-group">
                                <label>Weight (grams)</label>
                                <input type="number" class="form-control" id="pWeight" min="0" value="0">
                            </div>
                            <div class="form-group full-width">
                                <label>Description</label>
                                <textarea class="form-control" id="pDescription" rows="4" placeholder="Product description"></textarea>
                            </div>
                            <div class="form-group full-width">
                                <label>Thumbnail URL</label>
                                <input type="url" class="form-control" id="pThumbnail" placeholder="https://...">
                            </div>
                            <div class="form-group full-width">
                                <label>Image URLs (one per line)</label>
                                <textarea class="form-control" id="pImages" rows="3" placeholder="https://image1.jpg&#10;https://image2.jpg"></textarea>
                            </div>
                            <div class="form-group full-width">
                                <label>Tags (comma separated)</label>
                                <input type="text" class="form-control" id="pTags" placeholder="tag1, tag2, tag3">
                            </div>
                            <div class="form-group">
                                <div class="checkbox-group">
                                    <input type="checkbox" id="pFeatured">
                                    <label for="pFeatured" style="margin:0;">Featured Product</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="checkbox-group">
                                    <input type="checkbox" id="pSpecial">
                                    <label for="pSpecial" style="margin:0;">Special Deal</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="checkbox-group">
                                    <input type="checkbox" id="pActive" checked>
                                    <label for="pActive" style="margin:0;">Active</label>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-1 mt-2">
                            <button type="submit" class="btn btn-primary" id="saveProductBtn">Save Product</button>
                            <button type="button" class="btn btn-ghost" onclick="hideProductForm()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Products List -->
            <div id="productsContent">
                <div class="page-loader"><div class="loading-spinner"></div></div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
        if (sessionStorage.getItem('adminAuth') !== 'true') location = 'index.html';
        
        let allCategories = [];
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCategories();
            await loadProducts();
        });
        
        async function loadCategories() {
            const { data } = await DB.getAllCategories();
            allCategories = data || [];
            
            const catSelect = document.getElementById('pCategory');
            const subSelect = document.getElementById('pSubCategory');
            
            const parents = allCategories.filter(c => !c.parent_id);
            parents.forEach(c => {
                catSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
            
            catSelect.addEventListener('change', () => {
                subSelect.innerHTML = '<option value="">Select sub-category</option>';
                const subs = allCategories.filter(c => c.parent_id === catSelect.value);
                subs.forEach(c => {
                    subSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });
            });
        }
        
        async function loadProducts() {
            const container = document.getElementById('productsContent');
            const { data: products } = await DB.getAllProducts();
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No products yet</h3><p>Add your first product</p></div>';
                return;
            }
            
            container.innerHTML = `
                <div class="admin-table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>MRP</th>
                                <th>Base Price</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${products.map(p => `
                                <tr>
                                    <td>
                                        <div class="product-cell">
                                            <div class="thumb">
                                                <img src="${p.thumbnail || placeholderImage('')}" alt="">
                                            </div>
                                            <div>
                                                <strong>${p.name}</strong>
                                                <br><small class="text-muted">${p.sku || '-'} ${p.is_featured ? '⭐' : ''} ${p.is_special ? '🔥' : ''}</small>
                                            </div>
                                        </div>
                                    </td>
                                    <td>${formatCurrency(p.mrp)}</td>
                                    <td>${formatCurrency(p.base_price)}</td>
                                    <td>${p.stock}</td>
                                    <td><span class="tag ${p.is_active ? 'tag-success' : 'tag-danger'}">${p.is_active ? 'Active' : 'Inactive'}</span></td>
                                    <td>
                                        <div class="actions">
                                            <button class="edit-btn" onclick='editProduct(${JSON.stringify(p)})'>Edit</button>
                                            <button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function showProductForm() {
            document.getElementById('productFormTitle').textContent = 'Add New Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('pActive').checked = true;
            document.getElementById('productModal').classList.add('active');
        }
        
        function hideProductForm() {
            document.getElementById('productModal').classList.remove('active');
        }
        
        function editProduct(product) {
            document.getElementById('productFormTitle').textContent = 'Edit Product';
            document.getElementById('productId').value = product.id;
            document.getElementById('pName').value = product.name;
            document.getElementById('pSku').value = product.sku || '';
            document.getElementById('pMrp').value = product.mrp;
            document.getElementById('pBasePrice').value = product.base_price;
            document.getElementById('pCategory').value = product.category_id || '';
            document.getElementById('pStock').value = product.stock;
            document.getElementById('pWeight').value = product.weight_grams || 0;
            document.getElementById('pDescription').value = product.description || '';
            document.getElementById('pThumbnail').value = product.thumbnail || '';
            document.getElementById('pImages').value = (product.images || []).join('\n');
            document.getElementById('pTags').value = (product.tags || []).join(', ');
            document.getElementById('pFeatured').checked = product.is_featured;
            document.getElementById('pSpecial').checked = product.is_special;
            document.getElementById('pActive').checked = product.is_active;
            
            // Trigger subcategory load
            document.getElementById('pCategory').dispatchEvent(new Event('change'));
            setTimeout(() => {
                document.getElementById('pSubCategory').value = product.subcategory_id || '';
            }, 100);
            
            document.getElementById('productModal').classList.add('active');
        }
        
        async function saveProduct(e) {
            e.preventDefault();
            
            const id = document.getElementById('productId').value;
            const name = document.getElementById('pName').value.trim();
            
            const productData = {
                name: name,
                slug: slugify(name) + '-' + Date.now().toString(36),
                sku: document.getElementById('pSku').value.trim() || null,
                mrp: parseFloat(document.getElementById('pMrp').value),
                base_price: parseFloat(document.getElementById('pBasePrice').value),
                category_id: document.getElementById('pCategory').value || null,
                subcategory_id: document.getElementById('pSubCategory').value || null,
                stock: parseInt(document.getElementById('pStock').value) || 0,
                weight_grams: parseInt(document.getElementById('pWeight').value) || 0,
                description: document.getElementById('pDescription').value.trim(),
                thumbnail: document.getElementById('pThumbnail').value.trim() || null,
                images: document.getElementById('pImages').value.split('\n').map(s => s.trim()).filter(Boolean),
                tags: document.getElementById('pTags').value.split(',').map(s => s.trim()).filter(Boolean),
                is_featured: document.getElementById('pFeatured').checked,
                is_special: document.getElementById('pSpecial').checked,
                is_active: document.getElementById('pActive').checked
            };
            
            if (productData.base_price > productData.mrp) {
                Toast.error('Base price cannot be greater than MRP');
                return;
            }
            
            const btn = document.getElementById('saveProductBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            
            let result;
            if (id) {
                delete productData.slug;
                result = await DB.updateProduct(id, productData);
            } else {
                result = await DB.createProduct(productData);
            }
            
            if (result.error) {
                Toast.error('Failed to save: ' + result.error.message);
                btn.disabled = false;
                btn.textContent = 'Save Product';
                return;
            }
            
            Toast.success(id ? 'Product updated!' : 'Product created!');
            hideProductForm();
            loadProducts();
            
            btn.disabled = false;
            btn.textContent = 'Save Product';
        }
        
        async function deleteProduct(id) {
            if (!confirm('Delete this product? This cannot be undone.')) return;
            
            const { error } = await DB.deleteProduct(id);
            if (error) {
                Toast.error('Failed to delete');
                return;
            }
            Toast.success('Product deleted');
            loadProducts();
        }
    </script>
</body>
  </html>
