<!-- search.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Conitek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header"><div class="container"><a href="/" class="header-logo"><span>Conitek</span></a><div class="header-search" style="display:flex !important;"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search products..." onkeydown="handleSearchInput(event)" autofocus></div><div class="header-actions"><a href="cart.html" class="header-action-btn">🛒<span class="badge cart-badge hidden">0</span></a><button class="btn btn-primary btn-sm" id="loginBtn" onclick="Auth.showLoginModal()">Login</button><div style="position:relative;"><button class="user-menu-trigger hidden" id="userMenuTrigger"><span class="avatar" id="userAvatar">U</span><span class="user-name" id="userName">User</span></button><div class="user-dropdown" id="userDropdown"><a href="account.html">👤 Account</a><a href="orders.html">📦 Orders</a><div class="divider"></div><button class="logout-btn" onclick="Auth.signOut()">🚪 Logout</button></div></div></div></div></header>
    <main class="main-content">
        <div class="container">
            <div class="page-header"><h1 id="searchTitle">Search Products</h1></div>
            <div id="searchResults">
                <div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <h3>Search for products</h3>
                    <p>Type a product name, category, or keyword</p>
                </div>
            </div>
        </div>
    </main>
    <nav class="bottom-nav"><a href="/" class="bottom-nav-item"><span class="nav-icon">🏠</span>Home</a><a href="category.html" class="bottom-nav-item"><span class="nav-icon">📂</span>Categories</a><a href="cart.html" class="bottom-nav-item"><span class="nav-icon">🛒</span>Cart</a><a href="orders.html" class="bottom-nav-item"><span class="nav-icon">📦</span>Orders</a><a href="account.html" class="bottom-nav-item"><span class="nav-icon">👤</span>Account</a></nav>
    <div class="modal-overlay" id="authModal"><div class="modal auth-modal"><button class="modal-close" onclick="Auth.hideLoginModal()">✕</button><div class="auth-header"><div class="logo">Conitek</div><h2>Login</h2></div><div id="phoneStep"><div class="form-group"><label>Phone</label><input type="tel" class="form-control" id="authPhone" maxlength="10"></div><button class="btn btn-primary btn-full" id="sendOtpBtn" onclick="Auth.sendLoginOTP()">Send OTP</button></div><div id="otpStep" class="hidden"><div class="otp-inputs"><input type="text" maxlength="1" inputmode="numeric"><input type="text" maxlength="1" inputmode="numeric"><input type="text" maxlength="1" inputmode="numeric"><input type="text" maxlength="1" inputmode="numeric"><input type="text" maxlength="1" inputmode="numeric"><input type="text" maxlength="1" inputmode="numeric"></div><button class="btn btn-primary btn-full mt-2" id="verifyOtpBtn" onclick="Auth.verifyLoginOTP()">Verify</button></div><div id="nameStep" class="hidden"><div class="form-group"><label>Name</label><input type="text" class="form-control" id="authName"></div><button class="btn btn-primary btn-full" onclick="Auth.completeRegistration()">Done</button></div></div></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/supabase-client.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script><script src="js/search.js"></script>
</body>
</html>
