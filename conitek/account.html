<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Conitek</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="container">
        <a href="/" class="header-logo">Conitek</a>

        <button id="loginBtn" onclick="Auth.showLoginModal()">Login</button>

        <button id="userMenuTrigger" class="hidden">
            <span id="userAvatar">U</span>
            <span id="userName">User</span>
        </button>
    </div>
</header>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
    <div class="modal">
        <button onclick="Auth.hideLoginModal()">✕</button>

        <h2>Login</h2>

        <!-- PHONE -->
        <div id="phoneStep">
            <input type="tel" id="authPhone" placeholder="Enter phone">
            <button id="sendOtpBtn" onclick="Auth.sendLoginOTP()">Send OTP</button>
        </div>

        <!-- OTP -->
        <div id="otpStep" class="hidden">
            <input maxlength="6" id="otpInput" placeholder="Enter OTP">
            <button onclick="Auth.verifyLoginOTP()">Verify OTP</button>
        </div>

        <!-- NAME -->
        <div id="nameStep" class="hidden">
            <input type="text" id="authName" placeholder="Your name">
            <button onclick="Auth.completeRegistration()">Done</button>
        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="js/otp.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
