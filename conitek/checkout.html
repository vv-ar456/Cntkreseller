<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Conitek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="header-logo"><img src="logo.png" alt="Conitek" onerror="this.style.display='none'"><span>Conitek</span></a>
            <div class="header-actions">
                <div style="position:relative;">
                    <button class="user-menu-trigger" id="userMenuTrigger"><span class="avatar" id="userAvatar">U</span><span class="user-name" id="userName">User</span></button>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="account.html">👤 Account</a><a href="orders.html">📦 Orders</a>
                        <div class="divider"></div><button class="logout-btn" onclick="Auth.signOut()">🚪 Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="main-content" id="checkoutPage"><div class="page-loader"><div class="loading-spinner"></div></div></main>
    <button class="btn btn-primary btn-sm hidden" id="loginBtn"></button>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
