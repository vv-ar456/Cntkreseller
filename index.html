<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Conitek</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
nav { display:flex; justify-content:space-between; padding:15px; background:#1e293b; }
input { padding:8px; border-radius:8px; border:none; }
.container { padding:20px; }
.card { background:#1e293b; padding:15px; border-radius:12px; margin:10px; display:inline-block; width:180px; cursor:pointer; }
.card:hover { transform:scale(1.05); }
button { background:#22c55e; padding:10px; border:none; border-radius:10px; color:white; cursor:pointer; margin-top:5px; }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); }
.modal-content { background:#1e293b; padding:20px; margin:100px auto; width:300px; border-radius:12px; }
</style>
</head>

<body>

<nav>
  <h2>Conitek</h2>
  <input id="search" placeholder="Search..." onkeyup="searchProducts()">
  <div>
    <button onclick="showCart()">Cart</button>
    <button onclick="adminLogin()">Admin</button>
  </div>
</nav>

<div class="container">
  <div id="products"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="pname"></h3>
    <p>MRP: ₹<span id="pmrp"></span></p>
    <input id="margin" placeholder="Enter margin">
    <button onclick="addToCart()">Add</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// 🔑 CONFIG
const SUPABASE_URL = "https://ahbtazekfopmjppnlrxc.supabase.co";
const SUPABASE_KEY = "PASTE_YOUR_KEY";
const RAZORPAY_KEY = "PASTE_KEY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// GLOBAL
let allProducts = [];
let selectedProduct = null;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// LOAD PRODUCTS
async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  allProducts = data || [];
  renderProducts(allProducts);
}

function renderProducts(data) {
  let html = "";
  data.forEach(p => {
    html += `
    <div class="card" onclick="openModal(${p.id}, '${p.name}', ${p.price})">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
    </div>`;
  });
  document.getElementById("products").innerHTML = html;
}

// SEARCH
function searchProducts() {
  let q = document.getElementById("search").value.toLowerCase();
  let filtered = allProducts.filter(p => p.name.toLowerCase().includes(q));
  renderProducts(filtered);
}

// MODAL
function openModal(id,name,price){
  selectedProduct = {id,name,price};
  pname.innerText = name;
  pmrp.innerText = price;
  modal.style.display="block";
}
function closeModal(){ modal.style.display="none"; }

// CART
function addToCart(){
  let margin = Number(document.getElementById("margin").value);
  if(!margin) return alert("Enter margin");

  let sellingPrice = selectedProduct.price + margin;

  cart.push({...selectedProduct, margin, sellingPrice});
  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart");
  closeModal();
}

// SHOW CART
function showCart(){
  let text = "Cart:\n";
  cart.forEach(i=>{
    text += `${i.name} - ₹${i.sellingPrice}\n`;
  });

  if(confirm(text + "\nProceed to payment?")){
    checkout();
  }
}

// PAYMENT
function checkout(){
  let total = cart.reduce((a,b)=>a+b.sellingPrice,0);

  var options = {
    key: RAZORPAY_KEY,
    amount: total*100,
    currency: "INR",
    name: "Conitek",
    handler: function (){
      saveOrder();
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}

// SAVE ORDER
async function saveOrder(){
  for(let item of cart){
    await supabase.from("orders").insert({
      product_id: item.id,
      selling_price: item.sellingPrice,
      margin: item.margin,
      status: "pending"
    });
  }

  localStorage.removeItem("cart");
  cart = [];
  alert("Order Placed!");
}

// ADMIN
function adminLogin(){
  let pass = prompt("Enter Admin Password");
  if(pass==="conitek123"){
    let name = prompt("Product Name");
    let price = prompt("Price");

    supabase.from("products").insert({name,price});
    alert("Added");
  }
}

// INIT
loadProducts();

</script>

</body>
</html>
